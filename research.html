<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    name="description"
    content="智能感知与协同计算课题组工作成果页面，展示研究方向、项目、论文、专利与开源工作。"
  >
  <title>工作成果 | 智能感知与协同计算课题组</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800&family=Plus+Jakarta+Sans:wght@500;700;800&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="assets/styles/main.css">
</head>
<body data-page="research">
  <header class="site-header" id="site-header"></header>

  <main>
    <!-- 成果页先总览研究主线，再细分不同类型成果。 -->
    <section class="page-banner">
      <div class="container">
        <p class="eyebrow">Research Outputs</p>
        <h1>工作成果</h1>
        <p class="page-intro">
          页面包含课题组研究方向、代表性论文、承担项目与技术转化信息，适合作为课题组官网的成果展示入口。
        </p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Directions</p>
            <h2>研究方向</h2>
          </div>
        </div>
        <div class="card-grid" id="research-direction-list"></div>
      </div>
    </section>

    <section class="section section-soft">
      <div class="container">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Selected Publications</p>
            <h2>代表性论文</h2>
          </div>
        </div>
        <div class="stack-list" id="publication-list"></div>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Projects & Transfer</p>
            <h2>项目与转化</h2>
          </div>
        </div>
        <div class="stack-list" id="project-list"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="assets/scripts/site-data.js"></script>
  <script src="assets/scripts/main.js"></script>
</body>
</html>
