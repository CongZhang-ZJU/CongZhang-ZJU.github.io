<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    name="description"
    content="智能感知与协同计算课题组官方网站，展示近期科研进展、成员介绍、工作成果与完整新闻。"
  >
  <title>智能感知与协同计算课题组</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800&family=Plus+Jakarta+Sans:wght@500;700;800&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="assets/styles/main.css">
</head>
<body data-page="home">
  <!-- 顶部导航将由共享脚本统一渲染，避免每个页面重复维护。 -->
  <header class="site-header" id="site-header"></header>

  <main>
    <!-- 首页头图区：用于第一时间说明课题组定位、方向和入口。 -->
    <section class="hero">
      <div class="container hero-grid">
        <div class="hero-copy">
          <p class="eyebrow">Research Group Website</p>
          <h1 id="hero-title">智能感知与协同计算课题组</h1>
          <p class="hero-text" id="hero-text"></p>
          <div class="hero-actions">
            <a class="button button-primary" href="research.html">查看工作成果</a>
            <a class="button button-secondary" href="members.html">了解团队成员</a>
          </div>
        </div>
        <aside class="hero-panel" id="hero-panel">
          <!-- 统计卡片由脚本从共享数据中生成。 -->
        </aside>
      </div>
    </section>

    <!-- 近期科研进展：对应用户要求的首页重点模块。 -->
    <section class="section">
      <div class="container">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Recent Progress</p>
            <h2>近期科研进展</h2>
          </div>
          <a class="text-link" href="news.html">查看完整 News</a>
        </div>
        <div class="card-grid" id="recent-progress-list"></div>
      </div>
    </section>

    <!-- 研究方向：让访客在首页快速理解课题组的研究布局。 -->
    <section class="section section-soft">
      <div class="container">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Research Areas</p>
            <h2>重点研究方向</h2>
          </div>
        </div>
        <div class="card-grid" id="research-area-list"></div>
      </div>
    </section>

    <!-- 精选成果：从成果页抽取精华，提升首页信息密度。 -->
    <section class="section">
      <div class="container">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Featured Outputs</p>
            <h2>代表性工作成果</h2>
          </div>
          <a class="text-link" href="research.html">进入成果页</a>
        </div>
        <div class="feature-grid" id="featured-output-list"></div>
      </div>
    </section>
  </main>

  <!-- 页脚也由脚本统一渲染，保证多页面内容一致。 -->
  <footer class="site-footer" id="site-footer"></footer>

  <script src="assets/scripts/site-data.js"></script>
  <script src="assets/scripts/main.js"></script>
</body>
</html>
